<section class="hero" id="home">
  @for (slide of slides; track $index) {
    <div class="hero-slide" [class.active]="currentSlide === $index"
         [style.background-image]="'url(' + slide.image + ')'">
    </div>
  }

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="container">
      <div class="hero-text">
        <span class="hero-tag animate-fade-down">
          <i class="fas fa-hard-hat"></i>
          {{ slides[currentSlide].subtitle }}
        </span>
        <h1 class="animate-fade-up">{{ slides[currentSlide].title }}</h1>
        <p class="animate-fade-up">{{ slides[currentSlide].description }}</p>
        <div class="hero-buttons animate-fade-up">
          <a href="#projects" class="btn-primary">
            Our Projects <i class="fas fa-arrow-right"></i>
          </a>
          <a href="#contact" class="btn-outline">
            <i class="fas fa-play-circle"></i> Get Free Quote
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="hero-dots">
    @for (slide of slides; track $index) {
      <button class="dot" [class.active]="currentSlide === $index"
              (click)="goToSlide($index)"></button>
    }
  </div>

  <div class="scroll-indicator">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
    <span>Scroll Down</span>
  </div>
</section>
